name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (skip private cross-deps via --no-deps)
        run: |
          pip install --no-deps -e .
          pip install pydantic pytest pyyaml
      - name: Install dev tools
        run: pip install -e ".[dev]" --no-deps || true
      - name: Tests
        run: python -m pytest
